name: Tests (reusable)

on:
  workflow_call:


jobs:
  test:
    name: "Test Python ${{ matrix.python-version }} on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: "Checkout code"
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #v5.0.0

      - name: "Set up Python ${{ matrix.python-version }}"
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c #v6.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: "Configure git credentials for private repos"
        env:
          GH_TOKEN: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
        run: |
          $token = "x-access-token:$env:GH_TOKEN"
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($token)
          $encoded = [System.Convert]::ToBase64String($bytes)
          git config --global http.https://github.com/.extraheader "AUTHORIZATION: basic $encoded"
        shell: pwsh

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: "Run unit tests"
        run: |
          pytest -m "not integration" --cov=ansys.mapdl.mcp --cov-report=xml --cov-report=term

    #   - name: Upload coverage to Codecov
    #     uses: codecov/codecov-action@v4
    #     if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
    #     with:
    #       file: ./coverage.xml
    #       flags: unittests
    #       name: codecov-umbrella
    #       fail_ci_if_error: false

  integration-local:
    name: "Integration Tests (local MAPDL)"
    runs-on: ubuntu-22.04
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    container:
      image: ghcr.io/ansys/mapdl:v25.1-ubuntu-cicd
      options: -u=0:0 --oom-kill-disable --memory=6656MB --memory-swap=16896MB --shm-size=1gb --entrypoint /bin/bash
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    env:
      OMPI_ALLOW_RUN_AS_ROOT: 1
      OMPI_ALLOW_RUN_AS_ROOT_CONFIRM: 1
      ON_LOCAL: "true"
      PYMAPDL_NPROC: 1

    steps:
      - name: "Install Git and checkout project"
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #v5.0.0
        with:
          repository: ansys/pymapdl-mcp
          persist-credentials: false

      - name: "Install gcc"
        shell: bash
        run: |
          apt-get update && apt-get -y install gcc mono-mcs g++ libgl1 libglx-mesa0 xvfb libgomp1 graphviz curl git && apt-get clean

      - name: "Setup Python"
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c #v6.0.0
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

      - name: "Checking Python"
        shell: bash
        run: |
          python --version
          python -m pip install --upgrade pip

      - name: "Configure git credentials for private repos"
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
        run: |
          git config --global http.https://github.com/.extraheader "AUTHORIZATION: basic $(echo -n "x-access-token:${GH_TOKEN}" | base64)"

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: "Run integration tests"
        env:
          PYMAPDL_ADDITIONAL_SWITCHES: "-mpi openmpi"
          LICENSE_SERVER: ${{ secrets.LICENSE_SERVER }}
        run: |
          export ANSYSLMD_LICENSE_FILE=1055@${LICENSE_SERVER}
          python -m pytest -m integration -v --tb=short

  integration-remote:
    name: Integration Tests (remote MAPDL)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    env:
      MAPDL_IMAGE: "ghcr.io/ansys/mapdl:v25.1-ubuntu-cicd"
      PYMAPDL_PORT: 21000
      ON_LOCAL: "false"

    steps:
      - name: "Checkout code"
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #v5.0.0

      - name: "Login to GitHub Container Registry"
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef #v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Pull MAPDL Docker image"
        run: |
          docker pull ${{ env.MAPDL_IMAGE }}

      - name: "Start MAPDL container"
        env:
          LICENSE_SERVER: ${{ secrets.LICENSE_SERVER }}
          MAPDL_IMAGE: ${{ env.MAPDL_IMAGE }}
          PYMAPDL_PORT: ${{ env.PYMAPDL_PORT }}
        run: |
          .ci/start_mapdl.sh

      - name: "Wait for MAPDL to be ready"
        run: |
          .ci/wait_for_mapdl.sh

      - name: "Set up Python"
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c #v6.0.0
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          cache: 'pip'

      - name: "Configure git credentials for private repos"
        env:
          GH_TOKEN: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
        run: |
          git config --global http.https://github.com/.extraheader "AUTHORIZATION: basic $(echo -n "x-access-token:${GH_TOKEN}" | base64)"

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: "Run integration tests"
        env:
          PYMAPDL_START_INSTANCE: "false"
          PYMAPDL_PORT: ${{ env.PYMAPDL_PORT }}
        run: |
          pytest -m integration -v --tb=short

      - name: "Collect MAPDL logs on failure"
        if: failure()
        run: |
          .ci/collect_mapdl_logs.sh

      - name: "Stop MAPDL container"
        if: always()
        run: |
          docker stop mapdl || true
          docker rm mapdl || true
