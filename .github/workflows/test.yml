name: Tests

on:
  pull_request:
  push:
    tags:
      - "v*"
    branches:
       - main
  schedule:
    # * is a special character in YAML so you have to quote this string
    - cron:  '30 4 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          pytest -m "not integration" --cov=ansys.mapdl.mcp --cov-report=xml --cov-report=term

    #   - name: Upload coverage to Codecov
    #     uses: codecov/codecov-action@v4
    #     if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
    #     with:
    #       file: ./coverage.xml
    #       flags: unittests
    #       name: codecov-umbrella
    #       fail_ci_if_error: false

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check code formatting with black
        run: |
          black --check src tests

      - name: Check import sorting with isort
        run: |
          isort --check-only src tests

      - name: Type check with mypy
        run: |
          mypy src/ansys/mapdl/mcp --ignore-missing-imports
        continue-on-error: true

  integration:
    name: Integration Tests (with MAPDL)
    runs-on: ubuntu-latest
    # Only run if license server secret is available (for PRs from forks, secrets aren't available)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    env:
      MAPDL_IMAGE: "ghcr.io/ansys/mapdl:v25.2-ubuntu-cicd"
      PYMAPDL_PORT: 50052

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull MAPDL Docker image
        run: |
          docker pull ${{ env.MAPDL_IMAGE }}

      - name: Create entrypoint script
        run: |
          cat > entrypoint.sh << 'EOF'
          #!/bin/bash
          set -e
          echo "Starting MAPDL server..."
          exec /ansys_inc/v252/ansys/bin/mapdl -grpc -dir /jobs -smp -np 2
          EOF
          chmod +x entrypoint.sh
          echo "=== Entrypoint script content ==="
          cat entrypoint.sh

      - name: Start MAPDL container
        run: |
          docker run -d \
            --name mapdl \
            --restart always \
            -e ANSYSLMD_LICENSE_FILE=1055@${{ secrets.LICENSE_SERVER }} \
            -e ANSYS_LOCK="OFF" \
            -e VERSION=252 \
            -e P_SCHEMA=/ansys_inc/v252/ansys/ac4/schema \
            -e ANS_BYPASS_CHECK_NUM_PROCESSES=1 \
            -e OMPI_ALLOW_RUN_AS_ROOT=1 \
            -e OMPI_ALLOW_RUN_AS_ROOT_CONFIRM=1 \
            -p ${{ env.PYMAPDL_PORT }}:50052 \
            --shm-size=2gb \
            -e I_MPI_SHM_LMT=shm \
            -w /jobs \
            -u=0:0 \
            --memory=6656MB \
            --memory-swap=16896MB \
            --mount type=bind,source="$(pwd)/entrypoint.sh",target=/entrypoint.sh,readonly \
            ${{ env.MAPDL_IMAGE }} \
            /bin/bash /entrypoint.sh

      - name: Wait for MAPDL to be ready
        run: |
          echo "Waiting for MAPDL to start..."
          for i in {1..30}; do
            if docker logs mapdl 2>&1 | grep -q "Server listening on"; then
              echo "MAPDL is ready!"
              docker logs mapdl
              exit 0
            fi
            echo "Attempt $i/30: MAPDL not ready yet, waiting..."
            sleep 2
          done
          echo "MAPDL failed to start within 60 seconds"
          echo "=== Container status ==="
          docker ps -a
          echo "=== Container logs ==="
          docker logs mapdl
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests
        run: |
          pytest -m integration -v --tb=short

      - name: Collect MAPDL logs on failure
        if: failure()
        run: |
          echo "=== MAPDL Container Logs ==="
          docker logs mapdl || echo "Could not retrieve container logs"
          echo "=== Docker Container Status ==="
          docker ps -a

      - name: Stop MAPDL container
        if: always()
        run: |
          docker stop mapdl || true
          docker rm mapdl || true
