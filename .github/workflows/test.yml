name: Tests

on:
  pull_request:
  push:
    tags:
      - "v*"
    branches:
       - main
  schedule:
    # * is a special character in YAML so you have to quote this string
    - cron:  '30 4 * * *'

jobs:
  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          pytest -m "not integration" --cov=ansys.mapdl.mcp --cov-report=xml --cov-report=term

    #   - name: Upload coverage to Codecov
    #     uses: codecov/codecov-action@v4
    #     if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
    #     with:
    #       file: ./coverage.xml
    #       flags: unittests
    #       name: codecov-umbrella
    #       fail_ci_if_error: false

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check code formatting with black
        run: |
          black --check src tests

      - name: Check import sorting with isort
        run: |
          isort --check-only src tests

      - name: Type check with mypy
        run: |
          mypy src/ansys/mapdl/mcp --ignore-missing-imports
        continue-on-error: true

  integration:
    name: Integration Tests (if MAPDL available)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests
        run: |
          pytest -m integration || echo "Integration tests skipped (MAPDL not available)"
        continue-on-error: true
