name: Tests

on:
  pull_request:
  push:
    tags:
      - "v*"
    branches:
       - main
  schedule:
    # * is a special character in YAML so you have to quote this string
    - cron:  '30 4 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #v5.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c #v6.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          pytest -m "not integration" --cov=ansys.mapdl.mcp --cov-report=xml --cov-report=term

    #   - name: Upload coverage to Codecov
    #     uses: codecov/codecov-action@v4
    #     if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
    #     with:
    #       file: ./coverage.xml
    #       flags: unittests
    #       name: codecov-umbrella
    #       fail_ci_if_error: false

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #v5.0.0

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c #v6.0.0
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check code formatting with black
        run: |
          black --check src tests

      - name: Check import sorting with isort
        run: |
          isort --check-only src tests

      - name: Type check with mypy
        run: |
          mypy src/ansys/mapdl/mcp --ignore-missing-imports
        continue-on-error: true

  integration:
    name: Integration Tests (with MAPDL)
    runs-on: ubuntu-latest
    # Only run if license server secret is available (for PRs from forks, secrets aren't available)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    env:
      MAPDL_IMAGE: "ghcr.io/ansys/mapdl:v25.2-ubuntu-cicd"
      PYMAPDL_PORT: 21000

    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #v5.0.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef #v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # - name: "Pull, launch, and validate MAPDL service"
      #   id: start_mapdl
      #   env:
      #     LICENSE_SERVER: ${{ secrets.LICENSE_SERVER }}
      #     MAPDL_VERSION: 'v25.2-ubuntu-cicd'
      #     DISTRIBUTED_MODE: "smp"
      #     MAPDL_PACKAGE: ghcr.io/ansys/mapdl
      #     DPF_PORT_INTERNAL: 21001
      #     INSTANCE_NAME: MAPDL_0
      #   shell: bash
      #   run: |
      #     echo "Launching MAPDL instance..."
      #     .ci/start_mapdl.sh &> mapdl_launch.log

      - name: Pull MAPDL Docker image
        run: |
          docker pull ${{ env.MAPDL_IMAGE }}

      - name: Start MAPDL container
        run: |
          docker run --name mapdl -d -p ${{ env.PYMAPDL_PORT }}:50052 -e ANSYSLMD_LICENSE_FILE=1055@${{ secrets.LICENSE_SERVER }} --env ANSYS_LOCK='OFF' ${{ env.MAPDL_IMAGE }} &> mapdl_launch.log

      # - name: Wait for MAPDL to be ready
      #   run: |
      #     echo "Waiting for MAPDL to start..."
      #     for i in {1..30}; do
      #       if docker logs mapdl 2>&1 | grep -q "Server listening on"; then
      #         echo "MAPDL is ready!"
      #         docker logs mapdl
      #         exit 0
      #       fi
      #       echo "Attempt $i/30: MAPDL not ready yet, waiting..."
      #       sleep 2
      #     done
      #     echo "MAPDL failed to start within 60 seconds"
      #     echo "=== Container status ==="
      #     docker ps -a
      #     echo "=== Container logs ==="
      #     docker logs mapdl
      #     exit 1

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c #v6.0.0
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests
        run: |
          pytest -m integration -v --tb=short

      - name: Collect MAPDL logs on failure
        # if: failure()
        run: |
          echo "=== Log file"
          cat mapdl_launch.log
          echo "=== MAPDL Container Logs ==="
          docker logs mapdl || echo "Could not retrieve container logs"
          echo "=== Docker Container Status ==="
          docker ps -a

      - name: Stop MAPDL container
        if: always()
        run: |
          docker stop mapdl || true
          docker rm mapdl || true
