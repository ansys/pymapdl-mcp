name: Tests

on:
  pull_request:
  push:
    tags:
      - "v*"
    branches:
       - main
  schedule:
    - cron:  '30 4 * * *'  # Daily at 04:30 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ON_CI: true
  MAIN_PYTHON_VERSION: "3.10"
  PACKAGE_NAME: "ansys-common-mcp"

jobs:
  lint:
    name: "Code Quality"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout code"
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #v5.0.0

      - name: "Set up Python"
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c #v6.0.0
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: "Configure git credentials for private repos"
        env:
          GH_TOKEN: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
        run: |
          git config --global http.https://github.com/.extraheader "AUTHORIZATION: basic $(echo -n "x-access-token:${GH_TOKEN}" | base64)"

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: "Check code formatting with black"
        run: |
          black --check src tests

      - name: "Check import sorting with isort"
        run: |
          isort --check-only src tests

      - name: "Type check with mypy"
        run: |
          mypy src/ansys/mapdl/mcp --ignore-missing-imports
        continue-on-error: true


  unit-test-integration:
    name: "Unit tests and integration tests"
    needs: [lint]
    uses: ./.github/workflows/test.yml
    secrets: inherit
    with:
      on_ci: ${{ env.ON_CI }}
      main_python_version: ${{ env.MAIN_PYTHON_VERSION }}
      package_name: ${{ env.PACKAGE_NAME }}


  package:
    name: "Package library"
    needs: [unit-test-integration, lint]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: "Checkout code"
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #v5.0.0

      - name: "Configure git credentials for private repos"
        env:
          GH_TOKEN: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
        run: |
          $token = "x-access-token:$env:GH_TOKEN"
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($token)
          $encoded = [System.Convert]::ToBase64String($bytes)
          git config --global http.https://github.com/.extraheader "AUTHORIZATION: basic $encoded"
        shell: pwsh

      - name: "Build library source and wheel artifacts"
        uses: ansys/actions/build-library@41f86da4c9ead510db9135e428e33df9cc6f92e1 #v10.2.3
        with:
          library-name: ${{ env.PACKAGE_NAME }}
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          checkout: false


  release:
    name: "Release project"
    if: ${{ github.event_name == 'push' && contains(github.ref, 'refs/tags') }}
    needs: [package]
    runs-on: ubuntu-latest
    # Specifying a GitHub environment is optional, but strongly encouraged
    environment: release
    permissions:
      id-token: write
      contents: write
    steps:
      - name: "Download the library artifacts from build-library step"
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: ${{ env.PACKAGE_NAME }}-artifacts
          path: ${{ env.PACKAGE_NAME }}-artifacts

      - name: "Display structure of downloaded files"
        run: ls -Rla

      - name: "Release to GitHub"
        uses: ansys/actions/release-github@41f86da4c9ead510db9135e428e33df9cc6f92e1 #v10.2.3
        with:
          library-name: ${{ env.PACKAGE_NAME }}
          token: ${{ secrets.GITHUB_TOKEN }}
          only-code: true
