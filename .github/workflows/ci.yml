name: CI/CD

on:
  pull_request:
  push:
    tags:
      - "v*"
    branches:
       - main
  schedule:
    - cron:  '30 4 * * *'  # Daily at 04:30 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ON_CI: "true"
  MAIN_PYTHON_VERSION: "3.10"
  PACKAGE_NAME: "ansys-mapdl-mcp"
  MAPDL_IMAGE: "ghcr.io/ansys/mapdl:v25.1-ubuntu-cicd"
  PYMAPDL_PORT: "21000"

jobs:
  lint:
    name: "Code Quality"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout code"
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #v5.0.0

      - name: "Set up Python"
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c #v6.0.0
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: "Configure git for private repositories"
        env:
          GH_TOKEN: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: "Check code formatting with black"
        run: |
          black --check src tests

      - name: "Check import sorting with isort"
        run: |
          isort --check-only src tests

      - name: "Type check with mypy"
        run: |
          mypy src/ansys/mapdl/mcp --ignore-missing-imports
        continue-on-error: true

  test:
    name: "Test Python ${{ matrix.python-version }} on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    needs: [lint]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: "Checkout code"
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #v5.0.0

      - name: "Set up Python ${{ matrix.python-version }}"
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c #v6.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: "Configure git for private repositories"
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: "Install dependencies"
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: "Run unit tests"
        run: |
          pytest -m "not integration" --cov=ansys.mapdl.mcp --cov-report=xml --cov-report=term

    #   - name: Upload coverage to Codecov
    #     uses: codecov/codecov-action@v4
    #     if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
    #     with:
    #       file: ./coverage.xml
    #       flags: unittests
    #       name: codecov-umbrella
    #       fail_ci_if_error: false

  integration-local:
    name: "Integration Tests (local MAPDL)"
    runs-on: ubuntu-22.04
    needs: [lint]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    container:
      image: ghcr.io/ansys/mapdl:v25.1-ubuntu-cicd
      options: -u=0:0 --oom-kill-disable --memory=6656MB --memory-swap=16896MB --shm-size=1gb --entrypoint /bin/bash
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    env:
      OMPI_ALLOW_RUN_AS_ROOT: 1
      OMPI_ALLOW_RUN_AS_ROOT_CONFIRM: 1
      ON_LOCAL: "true"
      PYMAPDL_NPROC: 1

    steps:
      - name: "Install Git and checkout project"
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #v5.0.0
        with:
          repository: ansys/pymapdl-mcp

      - name: "Install gcc"
        shell: bash
        run: |
          apt-get update && apt-get -y install gcc mono-mcs g++ libgl1 libglx-mesa0 xvfb libgomp1 graphviz curl git && apt-get clean

      - name: "Setup Python"
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c #v6.0.0
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

      - name: "Checking Python"
        shell: bash
        run: |
          python --version
          python -m pip install --upgrade pip

      - name: "Configure git for private repositories"
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: "Run integration tests"
        env:
          PYMAPDL_ADDITIONAL_SWITCHES: "-mpi openmpi"
          LICENSE_SERVER: ${{ secrets.LICENSE_SERVER }}
        run: |
          export ANSYSLMD_LICENSE_FILE=1055@${LICENSE_SERVER}
          python -m pytest -m integration -v --tb=short

  integration-remote:
    name: Integration Tests (remote MAPDL)
    needs: [lint]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    env:
      MAPDL_IMAGE: "ghcr.io/ansys/mapdl:v25.1-ubuntu-cicd"
      PYMAPDL_PORT: 21000
      ON_LOCAL: "false"

    steps:
      - name: "Checkout code"
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #v5.0.0

      - name: "Login to GitHub Container Registry"
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef #v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Pull MAPDL Docker image"
        run: |
          docker pull ${{ env.MAPDL_IMAGE }}

      - name: "Start MAPDL container"
        env:
          LICENSE_SERVER: ${{ secrets.LICENSE_SERVER }}
          MAPDL_IMAGE: ${{ env.MAPDL_IMAGE }}
          PYMAPDL_PORT: ${{ env.PYMAPDL_PORT }}
        run: |
          .ci/start_mapdl.sh

      - name: "Wait for MAPDL to be ready"
        run: |
          .ci/wait_for_mapdl.sh

      - name: "Set up Python"
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c #v6.0.0
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          cache: 'pip'

      - name: "Configure git for private repositories"
        env:
          GH_TOKEN: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: "Run integration tests"
        env:
          PYMAPDL_START_INSTANCE: "false"
          PYMAPDL_PORT: ${{ env.PYMAPDL_PORT }}
        run: |
          pytest -m integration -v --tb=short

      - name: "Collect MAPDL logs on failure"
        if: failure()
        run: |
          .ci/collect_mapdl_logs.sh

      - name: "Stop MAPDL container"
        if: always()
        run: |
          docker stop mapdl || true
          docker rm mapdl || true

  package:
    name: "Package library"
    needs: [test, integration-local, integration-remote]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: "Checkout code"
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 #v5.0.0

      - name: "Configure git for private repositories"
        env:
          GH_TOKEN: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: "Build library source and wheel artifacts"
        uses: ansys/actions/build-library@41f86da4c9ead510db9135e428e33df9cc6f92e1 #v10.2.3
        with:
          library-name: ${{ env.PACKAGE_NAME }}
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          checkout: false

  # docker-build-and-push:
  #   name: "Build and push Docker image"
  #   if: ${{ github.event_name == 'push' && contains(github.ref, 'refs/tags') }}
  #   needs: [package]
  #   runs-on: ubuntu-latest
  #   permissions:
  #     contents: read
  #     packages: write
  #   steps:
