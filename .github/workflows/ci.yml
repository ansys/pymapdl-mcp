name: CI/CD

on:
  pull_request:
  push:
    tags:
      - "v*"
    branches:
       - main
  schedule:
    - cron:  '30 4 * * *'  # Daily at 04:30 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ON_CI: "true"
  MAIN_PYTHON_VERSION: "3.13"
  PACKAGE_NAME: "ansys-mapdl-mcp"
  DOCUMENTATION_CNAME: "mapdl-mcp.docs.pyansys.com"
  PYMAPDL_GRPC_TRANSPORT: "insecure"

jobs:

  update-changelog:
    name: "Update CHANGELOG (on release)"
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags')
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to read and write repository contents
      pull-requests: write # Needed to create pull requests
    steps:
      - uses: ansys/actions/doc-deploy-changelog@90a4cd10a7253a205f71ee8619aefb8142c16f47 # v10.2.10
        with:
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}

  lint:
    name: "Code style checks"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: "Configure pip for private PyPI"
        run: |
          pip config set global.extra-index-url https://${{ secrets.PYANSYS_PYPI_PRIVATE_PAT }}@pkgs.dev.azure.com/pyansys/_packaging/pyansys/pypi/simple/

      - name: "Cache pre-commit hooks"
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 #v5.0.4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: "Run PyAnsys code style checks"
        uses: ansys/actions/code-style@de753211965a233968fb2cda376da99376b1b9e5 #v10.2.11
        with:
          checkout: false
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          use-python-cache: true


  test:
    name: "Test Python ${{ matrix.python-version }} on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    needs: [lint]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: "Checkout code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: "Set up Python ${{ matrix.python-version }}"
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 #v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: "Configure pip for private PyPI"
        run: |
          pip config set global.extra-index-url https://${{ secrets.PYANSYS_PYPI_PRIVATE_PAT }}@pkgs.dev.azure.com/pyansys/_packaging/pyansys/pypi/simple/

      - name: "Install dependencies"
        run: |
          pip install --upgrade pip
          pip install -e .[tests]
          pip list

      - name: "Run unit tests"
        run: |
          pytest -m "not integration" --cov=ansys.mapdl.mcp --cov-report=xml --cov-report=term

    #   - name: Upload coverage to Codecov
    #     uses: codecov/codecov-action@v4
    #     if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
    #     with:
    #       file: ./coverage.xml
    #       flags: unittests
    #       name: codecov-umbrella
    #       fail_ci_if_error: false

  integration-local:
    name: "Integration Tests (local MAPDL)"
    runs-on: ubuntu-22.04
    needs: [lint]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    container:
      image: ghcr.io/ansys/mapdl:v25.1-ubuntu-cicd
      options: -u=0:0 --oom-kill-disable --memory=6656MB --memory-swap=16896MB --shm-size=1gb --entrypoint /bin/bash
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    env:
      OMPI_ALLOW_RUN_AS_ROOT: 1
      OMPI_ALLOW_RUN_AS_ROOT_CONFIRM: 1
      ON_LOCAL: "true"
      PYMAPDL_NPROC: 1

    steps:
      - name: "Checkout code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: "Install gcc"
        shell: bash
        run: |
          apt-get update && apt-get -y install gcc mono-mcs g++ libgl1 libglx-mesa0 xvfb libgomp1 graphviz curl git && apt-get clean

      - name: "Set up Python"
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 #v6.2.0
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

      - name: "Install and configure pip for private PyPI"
        run: |
          python -m pip install --upgrade pip
          python -m pip config set global.extra-index-url https://${{ secrets.PYANSYS_PYPI_PRIVATE_PAT }}@pkgs.dev.azure.com/pyansys/_packaging/pyansys/pypi/simple/

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[tests]

      - name: "Run integration tests"
        env:
          PYMAPDL_ADDITIONAL_SWITCHES: "-mpi openmpi"
          LICENSE_SERVER: ${{ secrets.LICENSE_SERVER }}
        run: |
          export ANSYSLMD_LICENSE_FILE=1055@${LICENSE_SERVER}
          python -m pytest -m integration -v --tb=short

  integration-remote:
    name: Integration Tests (remote MAPDL)
    needs: [lint]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    env:
      PYMAPDL_PORT: 21000
      ON_LOCAL: "false"

    steps:
      - name: "Checkout code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: "Login to GitHub Container Registry"
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 #v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Launch first MAPDL instance using action"
        uses: ansys/pymapdl/.github/actions/launch-mapdl-docker@main
        with:
          mapdl-image: "ghcr.io/ansys/mapdl:v25.2-ubuntu-cicd"
          license-server: ${{ secrets.LICENSE_SERVER }}
          pymapdl-port: ${{ env.PYMAPDL_PORT }}

      - name: "Set up Python"
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 #v6.2.0
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          cache: 'pip'

      - name: "Configure pip for private PyPI"
        run: |
          pip config set global.extra-index-url https://${{ secrets.PYANSYS_PYPI_PRIVATE_PAT }}@pkgs.dev.azure.com/pyansys/_packaging/pyansys/pypi/simple/

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -e .[tests]

      - name: "Run integration tests"
        env:
          PYMAPDL_START_INSTANCE: "false"
          PYMAPDL_PORT: ${{ env.PYMAPDL_PORT }}
        run: |
          pytest -m integration -v --tb=short


  build-docs:
    name: "Build documentation"
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Install OS packages"
        shell: bash
        run: |
          sudo apt update && sudo apt install -y zip libgl1 libglx-mesa0 xvfb

      - name: Set up Python ${{ env.MAIN_PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: "Configure pip for private PyPI"
        run: |
          pip config set global.extra-index-url https://${{ secrets.PYANSYS_PYPI_PRIVATE_PAT }}@pkgs.dev.azure.com/pyansys/_packaging/pyansys/pypi/simple/

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -e .[doc]
          pip list

      - name: "Build documentation"
        run: |
          cd doc
          make clean
          xvfb-run make html | tee doc_build.log
        env:
          SPHINXOPTS: "-W --keep-going"

      - name: "Upload documentation artifact"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7.0.0
        with:
          name: documentation-html
          path: doc/_build/html/
          retention-days: 30

  package:
    name: "Package library"
    needs: [test, integration-local, integration-remote]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: "Checkout code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: "Configure pip for private PyPI"
        run: |
          pip config set global.extra-index-url https://${{ secrets.PYANSYS_PYPI_PRIVATE_PAT }}@pkgs.dev.azure.com/pyansys/_packaging/pyansys/pypi/simple/

      - name: "Build library source and wheel artifacts"
        uses: ansys/actions/build-library@de753211965a233968fb2cda376da99376b1b9e5 #v10.2.11
        env:
          UV_EXTRA_INDEX_URL: 'https://${{ secrets.PYANSYS_PYPI_PRIVATE_PAT }}@pkgs.dev.azure.com/pyansys/_packaging/pyansys/pypi/simple/'
        with:
          library-name: ${{ env.PACKAGE_NAME }}
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          checkout: false

  doc-deploy-dev:
    name: "Deploy development documentation"
    # Deploy development only when merging to main
    if: github.ref == 'refs/heads/main'  && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to push documentation to gh-pages branch
    needs: [build-docs, package]
    steps:
      - name: "Deploy the latest documentation"
        uses: ansys/actions/doc-deploy-dev@de753211965a233968fb2cda376da99376b1b9e5 #v10.2.11
        with:
          cname: ${{ env.DOCUMENTATION_CNAME }}
          token: ${{ secrets.GITHUB_TOKEN }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}

  doc-deploy-pr:
    name: "Deploy PR documentation"
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'pr-preview')
    runs-on: ubuntu-latest
    needs: [build-docs]
    permissions:
      contents: write
    steps:
      - name: "Deploy the PR documentation"
        uses: ansys/actions/doc-deploy-dev@de753211965a233968fb2cda376da99376b1b9e5 #v10.2.11
        with:
          cname: ${{ env.DOCUMENTATION_CNAME }}
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}

  # docker-build-and-push:
  #   name: "Build and push Docker image"
