name: CI/CD

on:
  pull_request:
  push:
    tags:
      - "v*"
    branches:
       - main
  schedule:
    - cron:  '30 4 * * *'  # Daily at 04:30 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ON_CI: "true"
  MAIN_PYTHON_VERSION: "3.13"
  PACKAGE_NAME: "ansys-mapdl-mcp"
  DOCUMENTATION_CNAME: "mapdl-mcp.docs.pyansys.com"
  PYMAPDL_GRPC_TRANSPORT: "insecure"

jobs:

  update-changelog:
    name: "Update CHANGELOG (on release)"
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags')
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to read and write repository contents
      pull-requests: write # Needed to create pull requests
    steps:
      - uses: ansys/actions/doc-deploy-changelog@73fa84c704bb6691f254cfe4d4b928c338b0d4da #v10.3.0
        with:
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}

  lint:
    name: "Code style checks"
    runs-on: ubuntu-latest

    steps:
      - name: "Run PyAnsys code style checks"
        uses: ansys/actions/code-style@73fa84c704bb6691f254cfe4d4b928c338b0d4da #v10.3.0
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

  test:
    name: "Test Python ${{ matrix.python-version }} on ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    needs: [lint]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: "Run unit tests"
        uses: ansys/actions/tests-pytest@73fa84c704bb6691f254cfe4d4b928c338b0d4da #v10.3.0
        with:
          python-version: ${{ matrix.python-version }}
          pytest-markers: '-m "not integration"'

    #   - name: Upload coverage to Codecov
    #     uses: codecov/codecov-action@v4
    #     if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
    #     with:
    #       file: ./coverage.xml
    #       flags: unittests
    #       name: codecov-umbrella
    #       fail_ci_if_error: false

  integration-local:
    name: "Integration Tests (local MAPDL)"
    runs-on: ubuntu-22.04
    needs: [lint]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    container:
      image: ghcr.io/ansys/mapdl:v25.1-ubuntu-cicd
      options: -u=0:0 --oom-kill-disable --memory=6656MB --memory-swap=16896MB --shm-size=1gb --entrypoint /bin/bash
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    env:
      OMPI_ALLOW_RUN_AS_ROOT: 1
      OMPI_ALLOW_RUN_AS_ROOT_CONFIRM: 1
      ON_LOCAL: "true"
      PYMAPDL_NPROC: 1

    steps:
      - name: "Install gcc"
        shell: bash
        run: |
          apt-get update && apt-get -y install gcc mono-mcs g++ libgl1 libglx-mesa0 xvfb libgomp1 graphviz curl git && apt-get clean

      - name: "Run integration tests"
        uses: ansys/actions/tests-pytest@73fa84c704bb6691f254cfe4d4b928c338b0d4da #v10.3.0
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          pytest-markers: '-m "integration"'
        env:
          PYMAPDL_ADDITIONAL_SWITCHES: "-mpi openmpi"
          ANSYSLMD_LICENSE_FILE: "1055@${{ secrets.LICENSE_SERVER }}"

  integration-remote:
    name: "Integration Tests (remote MAPDL)"
    needs: [lint]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    env:
      PYMAPDL_PORT: 21000
      ON_LOCAL: "false"

    steps:
      - name: "Login to GitHub Container Registry"
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 #v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Launch first MAPDL instance using action"
        uses: ansys/pymapdl/.github/actions/launch-mapdl-docker@main
        with:
          mapdl-image: "ghcr.io/ansys/mapdl:v25.2-ubuntu-cicd"
          license-server: ${{ secrets.LICENSE_SERVER }}
          pymapdl-port: ${{ env.PYMAPDL_PORT }}

      - name: "Run integration tests"
        uses: ansys/actions/tests-pytest@73fa84c704bb6691f254cfe4d4b928c338b0d4da #v10.3.0
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          pytest-markers: '-m "integration"'
        env:
          PYMAPDL_START_INSTANCE: "false"
          PYMAPDL_PORT: ${{ env.PYMAPDL_PORT }}

  build-docs:
    name: "Build documentation"
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - name: "Run Ansys documentation building action"
        uses: ansys/actions/doc-build@73fa84c704bb6691f254cfe4d4b928c338b0d4da # v10.3.0
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          dependencies: 'zip libgl1 libglx-mesa0 xvfb'
          sphinxopts: '-W --keep-going'

  package:
    name: "Package library"
    needs: [test, integration-local, integration-remote]
    runs-on: ubuntu-latest
    permissions:
      attestations: write # Required to upload provenance attestations
      contents: read
      id-token: write # Required for OIDC authentication to upload provenance attestations
    steps:
      - name: "Build library source and wheel artifacts"
        uses: ansys/actions/build-library@73fa84c704bb6691f254cfe4d4b928c338b0d4da # v10.3.0
        with:
          library-name: ${{ env.PACKAGE_NAME }}
          python-version: ${{ env.MAIN_PYTHON_VERSION }}
          attest-provenance: true

  doc-deploy-dev:
    name: "Deploy development documentation"
    # Deploy development only when merging to main
    if: github.ref == 'refs/heads/main'  && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to push documentation to gh-pages branch
    needs: [build-docs, package]
    steps:
      - name: "Deploy the latest documentation"
        uses: ansys/actions/doc-deploy-dev@73fa84c704bb6691f254cfe4d4b928c338b0d4da #v10.3.0
        with:
          cname: ${{ env.DOCUMENTATION_CNAME }}
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}

  doc-deploy-pr:
    name: "Deploy PR documentation"
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'pr-preview')
    runs-on: ubuntu-latest
    needs: [build-docs]
    permissions:
      contents: write
    steps:
      - name: "Deploy the PR documentation"
        uses: ansys/actions/doc-deploy-pr@73fa84c704bb6691f254cfe4d4b928c338b0d4da #v10.3.0
        with:
          cname: ${{ env.DOCUMENTATION_CNAME }}
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}
          maximum-pr-doc-deployments: 10

  release:
      name: "Release project to GitHub"
      if: github.event_name == 'push' && contains(github.ref, 'refs/tags')
      needs: [package, update-changelog]
      runs-on: ubuntu-latest
      # Specifying a GitHub environment is optional, but strongly encouraged
      environment: release
      permissions:
        id-token: write # Required for GitHub release
        contents: write # Required for GitHub release
      steps:
        - name: "Release to GitHub"
          uses: ansys/actions/release-github@73fa84c704bb6691f254cfe4d4b928c338b0d4da # v10.3.0
          with:
            token: ${{ secrets.GITHUB_TOKEN }}
            library-name: ${{ env.PACKAGE_NAME }}
            add-artifact-attestation-notes: true
            changelog-release-notes: true

  release-pypi:
    name: "Release project to PyPI"
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags')
    needs: [package, update-changelog]
    runs-on: ubuntu-latest
    # Specifying a GitHub environment is optional, but strongly encouraged
    environment: release
    permissions:
      id-token: write # Required for OIDC authentication with PyPI
      contents: write # Required for OIDC authentication with PyPI
    steps:
      - name: "Download the library artifacts from build-library step"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.PACKAGE_NAME }}-artifacts
          path: ${{ env.PACKAGE_NAME }}-artifacts

      # - name: "Upload artifacts to PyPI using trusted publisher"
      #   uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
      #   with:
      #     repository-url: "https://upload.pypi.org/legacy/"
      #     print-hash: true
      #     packages-dir: ${{ env.PACKAGE_NAME }}-artifacts
      #     skip-existing: false

      - name: "Release to private PyPI"
        uses: ansys/actions/release-pypi-private@73fa84c704bb6691f254cfe4d4b928c338b0d4da #v10.3.0
        with:
          library-name: ${{ env.PACKAGE_NAME }}
          twine-username: "__token__"
          twine-token: ${{ secrets.PYANSYS_PYPI_PRIVATE_PAT }}

  doc-deploy-stable:
    name: "Deploy stable documentation"
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags')
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to push documentation to gh-pages branch
    needs: [release, release-pypi]
    steps:
      - name: "Deploy the stable documentation"
        uses: ansys/actions/doc-deploy-stable@73fa84c704bb6691f254cfe4d4b928c338b0d4da #v10.3.0
        with:
          cname: ${{ env.DOCUMENTATION_CNAME }}
          token: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
          render-last: '5'
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}
